name: data-update-3

on:
  workflow_dispatch:
  schedule:
    - cron: '30 01 * * 3'
permissions:
  contents: write

jobs:
  update_data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@main
    - name: Update data
      run: sh update_data.sh
    - uses: EndBug/add-and-commit@main
      with:
        author_name: Github Actions
        author_email: actions@github.com
        committer_email: actions@github.com

  build_docker:  
    needs: update_data
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master
      - name: Login to Docker Hub
        uses: docker/login-action@master
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@master
        with:
          push: true
          platforms: linux/386,linux/amd64,linux/arm/v6,linux/arm/v7,linux/arm64/v8,linux/ppc64le,linux/riscv64,linux/s390x
          tags: sliamb/paopao-pref:latest

  build_runner:
    # needs: build_mark
    needs: build_docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: actions/checkout@main
        with:
          repository: ${{ secrets.DATA }}
          token: ${{ secrets.GH_TOKEN }}
          path: 'data'
      - name: cp
        run: cp ./data/*.rules ./mark_builder/
      - name: build runner
        run: cd mark_builder && docker build --no-cache --progress=plain -t runner .
      - name: "Configure AWS Credentials"
        uses: aws-actions/configure-aws-credentials@main
        with:
          aws-region: us-east-1
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@main
        with:
          registry-type: public
      - name: tag
        run: docker tag runner ${{ secrets.ECR_TAG_RUNNER }}
      - name: push
        run: docker push ${{ secrets.ECR_TAG_RUNNER }} >/dev/null